<style>

<script>
firebase.initializeApp({apiKey:"AIzaSyCfHDITaX1diIWMYixW7ABefgpiRmvPPu8",authDomain:"tourmag-radar-crise.firebaseapp.com",projectId:"tourmag-radar-crise",storageBucket:"tourmag-radar-crise.firebasestorage.app",messagingSenderId:"960868555494",appId:"1:960868555494:web:1e96c9ea31df6c9685b927"});
const db=firebase.firestore();
const EDITO_TAGS=["expert","spokojny","guena","remi duchange","futuroscopie","eric didier","mazzola"];
function hasEditoTag(tags){if(!tags||!tags.length)return false;return tags.some(t=>EDITO_TAGS.some(et=>t.toLowerCase().includes(et)))}
const fD=d=>{if(!d)return'';const t=d.toDate?d.toDate():new Date(d);return t.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})};
const fS=d=>{if(!d)return'';const t=d.toDate?d.toDate():new Date(d);return t.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})};
const fT=s=>{if(!s)return'';const d=new Date(s);return d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})};
function spk(h,c,w=100,ht=26){if(!h||h.length<2)return'';const cl=h.map(x=>x.close),mn=Math.min(...cl),mx=Math.max(...cl),r=mx-mn||1;return`<svg width="${w}" height="${ht}" viewBox="0 0 ${w} ${ht}"><polyline points="${cl.map((v,i)=>`${Math.round(i/(cl.length-1)*w)},${Math.round(ht-((v-mn)/r)*(ht-4)-2)}`).join(' ')}" fill="none" stroke="${c}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`}
function vi(u){return u&&u.length>20&&!u.includes('1.gif')&&!u.includes('pixel')&&!u.includes('blank')&&!u.includes('spacer')}
function isNew(d){if(!d)return false;const t=d.toDate?d.toDate():new Date(d);return(Date.now()-t.getTime())<48*3600000}
function nb(d){return isNew(d)?'<span class="bdg-new">NOUVEAU</span>':''}
const CN={israel:'Israël',liban:'Liban',iran:'Iran',irak:'Irak',syrie:'Syrie',jordanie:'Jordanie',egypte:'Égypte',turquie:'Turquie',arabie_saoudite:'Arabie Saoudite',emirats:'Émirats',qatar:'Qatar',oman:'Oman',bahrein:'Bahreïn',koweit:'Koweït',yemen:'Yémen',chypre:'Chypre',grece:'Grèce'};
const CC={israel:[31.5,34.8],liban:[33.9,35.8],iran:[32.4,53.7],irak:[33.2,43.7],syrie:[35,38.5],jordanie:[31.2,36.5],egypte:[26.8,30.8],turquie:[39,35.2],arabie_saoudite:[23.9,45.1],emirats:[24.5,54.4],qatar:[25.3,51.2],oman:[21.5,56],bahrein:[26.1,50.5],koweit:[29.3,47.5],yemen:[15.5,48.5],chypre:[35.1,33.4],grece:[39,22]};
const CATS={aerien:{l:'Aérien',i:'✈️',bg:'#DBEAFE',c:'#1E40AF',cc:'#3B82F6'},institutionnel:{l:'Institutionnel',i:'🏛',bg:'#EDE9FE',c:'#5B21B6',cc:'#7C3AED'},croisiere:{l:'Croisière',i:'⚓',bg:'#CFFAFE',c:'#155E75',cc:'#0891B2'},juridique:{l:'Juridique',i:'⚖️',bg:'#FEF3C7',c:'#92400E',cc:'#D97706'},solutions:{l:'Solutions pros',i:'💡',bg:'#D1FAE5',c:'#065F46',cc:'#059669'},geopolitique:{l:'Géopolitique',i:'🌍',bg:'#FEE2E2',c:'#991B1B',cc:'#DC2626'},economie:{l:'Économie & données',i:'📊',bg:'#F1F5F9',c:'#334155',cc:'#64748B'},destinations:{l:'Destinations',i:'🗺️',bg:'#DBEAFE',c:'#1E3A5F',cc:'#2563EB'},general:{l:'Autres actualités',i:'📰',bg:'#F1F5F9',c:'#6B7280',cc:'#9CA3AF'}};
let ABC={},MAE={},BYCAT={};let pt=null;

function rH(cfg){
  document.getElementById('hdr').innerHTML=`<div class="logo"><span class="pd"></span>Crise au Moyen-Orient\u00a0: les répercussions pour le secteur du tourisme</div><a class="tm-btn" href="#" onclick="event.preventDefault();document.getElementById('themes').scrollIntoView({behavior:'smooth'})">📰 Tous les articles</a>`;
  document.getElementById('intro-p').innerHTML=`Depuis le 28 février 2026, une nouvelle phase de tensions au Moyen-Orient entre Israël et l'Iran vient raviver les incertitudes dans une région déjà marquée par une instabilité chronique. Les conséquences se font rapidement sentir sur l'industrie touristique mondiale\u00a0: perturbations du trafic aérien, reconfiguration des flux de voyageurs, ajustements des stratégies des tour-opérateurs et inquiétudes des destinations voisines.`}
function showP(co,arts){if(pt){clearTimeout(pt);pt=null}const p=document.getElementById('mp');p.classList.add('show');const md=MAE[co];const cm2={red:'#DC2626',orange:'#EA580C',yellow:'#D97706',green:'#059669',gray:'#9CA3AF'};const bgm={red:'#FEF2F2',orange:'#FFF7ED',yellow:'#FFFBEB',green:'#F0FDF4',gray:'#F9FAFB'};const ac=md?cm2[md.color]||'#9CA3AF':'#9CA3AF';const abg=md?bgm[md.color]||'#F9FAFB':'#F9FAFB';const lvl=md?md.level:'';
document.getElementById('mp-h').innerHTML=`<button class="cls" onclick="hideP(1)">&times;</button><h3>${CN[co]||co}</h3><span class="pc">${arts.length} article${arts.length>1?'s':''}</span>`;
document.getElementById('mp-a').innerHTML=lvl?`<span class="mp-badge" style="background:${abg};color:${ac};border:1px solid ${ac}30">${lvl}</span>`:'';
document.getElementById('mp-b').innerHTML=arts.slice(0,10).map(a=>`<div class="pa" onclick="window.open('${a.link}','_blank')"><div class="pt">${a.title}</div><div class="pm">${a.author||''} · ${fS(a.pub_date)}</div></div>`).join('')}
function hideP(f){if(f){document.getElementById('mp').classList.remove('show');pt=null}else{pt=setTimeout(()=>{document.getElementById('mp').classList.remove('show')},300)}}
function cancelH(){if(pt){clearTimeout(pt);pt=null}}

let moPage=0;const MO_PER_PAGE=8;
function openMo(cat,page){
  moPage=page||0;const cf=CATS[cat]||CATS.general;const arts=BYCAT[cat]||[];if(!arts.length)return;
  const tp=Math.ceil(arts.length/MO_PER_PAGE),pa=arts.slice(moPage*MO_PER_PAGE,(moPage+1)*MO_PER_PAGE);
  document.getElementById('mo-hd').innerHTML=`<div class="ci" style="background:${cf.bg};color:${cf.c}">${cf.i}</div><span class="mt">${cf.l}</span><span class="mc" style="background:${cf.cc}">${arts.length}</span><button class="cls" onclick="closeMo()">&times;</button>`;
  let h=pa.map(a=>{const img=vi(a.image_url)?`<img src="${a.image_url}" alt="" class="mi-img" onerror="this.remove()">`:'';return`<div class="mo-it" onclick="window.open('${a.link}','_blank')">${img}<div class="mi-bd"><div class="mi-t">${a.title}${nb(a.pub_date)}</div><div class="mi-m">${a.author||''} · ${fS(a.pub_date)}</div></div></div>`}).join('');
  if(tp>1){h+=`<div class="mo-pag"><div class="mo-pag-btn ${moPage===0?'disabled':''}" onclick="${moPage>0?`openMo('${cat}',${moPage-1})`:''}">‹</div>`;for(let p=0;p<tp;p++){h+=`<div class="mo-pag-btn ${p===moPage?'active':''}" onclick="openMo('${cat}',${p})">${p+1}</div>`}h+=`<div class="mo-pag-btn ${moPage>=tp-1?'disabled':''}" onclick="${moPage<tp-1?`openMo('${cat}',${moPage+1})`:''}">›</div></div>`}
  document.getElementById('mo-bd').innerHTML=h;

function positionModal(){const mo=document.getElementById('modal');mo.classList.add('show');window.parent.postMessage({type:'radar-get-position'},'*');const st=window.scrollY||0;const vh=window.innerHeight||document.documentElement.clientHeight;mo.style.top=st+'px';mo.style.height=vh+'px'}
window.addEventListener('message',function(e){if(e.data&&e.data.type==='radar-position-response'){const mo=document.getElementById('modal');if(mo&&mo.classList.contains('show')){mo.style.top=e.data.offsetTop+'px';mo.style.height=e.data.viewportHeight+'px'}}});
function closeMo(){document.getElementById('modal').classList.remove('show');document.body.style.overflow=''}


function render({articles,market,mae,config,synthesis,timeline,airlines}){
  rH(config);MAE=mae;
  const byCat={};articles.forEach(a=>{const c=a.category||'general';if(!byCat[c])byCat[c]=[];byCat[c].push(a)});BYCAT=byCat;
  ABC={};articles.forEach(a=>(a.countries||[]).forEach(c=>{if(!ABC[c])ABC[c]=[];ABC[c].push(a)}));
  let uneA=null;
  if(config.featured_article){const fa=config.featured_article;uneA={title:fa.title,link:fa.link,description:fa.description,image_url:fa.image_url,author:fa.author,pub_date:fa.pub_date?new Date(fa.pub_date):null}}
  if(!uneA){for(const a of articles.slice(0,15)){if(vi(a.image_url)){uneA=a;break}}}
  if(!uneA&&articles.length)uneA=articles[0];
  const crisisStart=new Date('2026-02-28');const daysSince=Math.floor((Date.now()-crisisStart.getTime())/86400000);
  const br=market['brent'],eu=market['eurusd'];
  let h='';

  // 1. HERO
  h+=`<div class="hero fi">`;
  const tl=timeline&&timeline.events?timeline.events:null;
  if(tl&&tl.length){h+=`<div class="hero-tl"><div class="hero-tl-track">`;tl.slice(-6).forEach(e=>{const d=e.date?new Date(e.date).toLocaleDateString('fr-FR',{day:'numeric',month:'short'}):'';h+=`<div class="hero-tl-item"><div class="hero-tl-dot"></div><div class="hero-tl-date">${d}</div><div class="hero-tl-ev">${e.event||''}</div></div>`});h+=`</div></div>`}
  h+=`<div class="hero-bottom">`;
  if(br){const c=br.change_pct>=0?'#EF4444':'#34D399';h+=`<div class="hero-ind"><div><div class="hi-lbl">Brent</div><div class="hi-val">${br.currency}${br.current_price}</div><div class="hi-chg" style="color:${c}">${br.change_pct>=0?'▲':'▼'} ${Math.abs(br.change_pct)}%</div></div><div class="hi-spk">${spk(br.history,c,70,22)}</div></div>`}
  if(eu){const c=eu.change_pct>=0?'#34D399':'#EF4444';h+=`<div class="hero-ind"><div><div class="hi-lbl">EUR/USD</div><div class="hi-val">${eu.current_price}</div><div class="hi-chg" style="color:${c}">${eu.change_pct>=0?'▲':'▼'} ${Math.abs(eu.change_pct)}%</div></div><div class="hi-spk">${spk(eu.history,c,70,22)}</div></div>`}
  h+=`<a class="hero-fin-btn" href="#" onclick="event.preventDefault();document.getElementById('finance').scrollIntoView({behavior:'smooth'})">📊 Tous les indicateurs</a>`;
  h+=`<div class="hero-day"><span class="hd-num">Jour ${daysSince}</span><span class="hd-lbl">de la crise</span></div>`;
  h+=`</div></div>`;

  // START 2-COLUMN LAYOUT
  h+=`<div class="layout">`;
  h+=`<div class="main-col">`;

  // 2. FLASH
  const flashA=articles.length?articles[0]:null;
  if(flashA){h+=`<div class="flash fi" onclick="window.open('${flashA.link}','_blank')"><span class="flash-badge">DERNIÈRE INFO</span><span class="flash-text">${flashA.title}</span><span class="flash-date">${fS(flashA.pub_date)}</span></div>`}

  // 3. UNE
  if(!uneA||uneA.link===flashA?.link){uneA=null;for(const a of articles.slice(1,15)){if(vi(a.image_url)){uneA=a;break}}}
  if(uneA){h+=`<div class="une-h fi" onclick="window.open('${uneA.link}','_blank')"><div class="une-h-bg">${vi(uneA.image_url)?`<img src="${uneA.image_url}" alt="">`:''}</div><div class="une-h-ov"></div><div class="une-h-bd"><span class="bdg">À la une</span><h3>${uneA.title}</h3><div class="ch">${uneA.description?uneA.description.substring(0,250)+'...':''}</div><div class="mt">${uneA.author||'TourMaG'} — ${fD(uneA.pub_date)} · <a href="${uneA.link}" target="_blank" onclick="event.stopPropagation()">Lire →</a></div></div></div>`}

  // 4. 3 VIGNETTES
  const usedLinks=new Set([flashA?.link,uneA?.link].filter(Boolean));
  const vignArts=articles.filter(a=>!usedLinks.has(a.link)&&vi(a.image_url)).slice(0,3);
  if(vignArts.length){h+=`<div class="vign-row fi">`;vignArts.forEach(a=>{h+=`<div class="vign" onclick="window.open('${a.link}','_blank')"><div class="vign-img"><img src="${a.image_url}" alt="" onerror="this.parentElement.style.background='#E5E7EB'"></div><div class="vign-body"><div class="vt">${a.title}${nb(a.pub_date)}</div><div class="vm">${a.author||''} · ${fS(a.pub_date)}</div></div></div>`});h+=`</div>`}

  // 5. ESSENTIEL
  const pts=synthesis&&synthesis.points?synthesis.points:null;
  if(pts&&pts.length){h+=`<div class="ess2 fi"><div class="ess2-head"><h2>⚡ L'essentiel de la crise</h2></div><div class="ess2-sub">Les ${pts.length} points clés à retenir</div><div class="ess2-grid">`;pts.forEach((p,i)=>{const tag=typeof p==='object'&&p.tag?p.tag:'INFO';const txt=typeof p==='object'&&p.text?p.text:(typeof p==='string'?p:'');h+=`<div class="ess2-card"><div class="ess2-left"><div class="ess2-num">${String(i+1).padStart(2,'0')}</div><span class="ess2-tag" data-t="${tag}">${tag}</span></div><div class="ess2-txt">${txt}</div></div>`});h+=`</div></div>`}

  // 6. CONSEILS
  h+=`<div class="sl fi">Conseils pratiques pour les agents de voyages</div><div class="act-box fi"><div class="act-grid"><div class="act-card"><div class="act-icon">📋</div><div><div class="act-t">Vérifier les conditions d'annulation</div><div class="act-d">Consultez les CGV de vos TO partenaires. Les conditions de force majeure varient selon les opérateurs.</div></div></div><div class="act-card"><div class="act-icon">🗺️</div><div><div class="act-t">Proposer des alternatives</div><div class="act-d">Grèce, Chypre, Jordanie, Oman : orientez vos clients vers des destinations accessibles.</div></div></div><div class="act-card"><div class="act-icon">🏛</div><div><div class="act-t">Suivre les alertes MAE</div><div class="act-d">Consultez France Diplomatie quotidiennement. Les niveaux d'alerte impactent vos ventes.</div></div></div></div></div>`;

  // 7. AIRLINES
  const al=airlines&&airlines.airlines?airlines.airlines:null;
  if(al&&al.length){h+=`<div class="sl fi">Statut des compagnies aériennes</div><div class="dep-board fi"><div class="dep-grid">`;al.forEach(a=>{const st=(a.statut||'').toLowerCase();const cls=st.includes('suspendu')?'suspendu':st.includes('perturb')?'perturbe':'operationnel';h+=`<div class="dep-row"><div class="dep-status ${cls}"></div><div><div class="dep-name">${a.compagnie||''}</div><div class="dep-det">${a.detail||a.statut||''}</div></div></div>`});h+=`</div></div>`}

  // 8. MAP + MAE
  h+=`<div class="sl fi">Zones impactées & conseils aux voyageurs</div><div class="map-full fi"><div id="map"></div><div class="mp" id="mp" onmouseenter="cancelH()" onmouseleave="hideP()"><div class="mp-h" id="mp-h"></div><div id="mp-a"></div><div class="mp-b" id="mp-b"></div></div></div>`;
  const mE=Object.values(mae).sort((a,b)=>{const o={red:0,orange:1,yellow:2,green:3,gray:4};return(o[a.color]||4)-(o[b.color]||4)});
  h+=`<div class="mae-bar fi">`;mE.forEach(m=>{h+=`<div class="mae-chip" onclick="window.open('${m.url}','_blank')"><span class="md ${m.color}"></span><span>${m.label}</span></div>`});h+=`</div>`;

  // 9. EDITO — articles edito + détection par tags Firestore
  const editoAll=byCat['edito']||[];
  // Chercher aussi les articles d'autres catégories qui ont un tag edito OU les mots-clés dans titre/description/auteur
  const expertArts=articles.filter(a=>{
    if(a.category==='edito')return false;
    const t=((a.title||'')+' '+(a.description||'')+' '+(a.author||'')).toLowerCase();
    const byText=t.includes('futuroscopie')||t.includes('expert communication')||t.includes('josette sicsic');
    const byTags=hasEditoTag(a.tags||[]);
    return byText||byTags;
  });
  const allExperts=[...editoAll,...expertArts];
  const seenE=new Set();const editoA=allExperts.filter(a=>{if(!vi(a.image_url)||seenE.has(a.link))return false;seenE.add(a.link);return true});
  if(editoA.length){h+=`<div class="sl fi">L'avis de nos experts</div><div class="edito-trib fi"><div class="edito-grid">`;
  editoA.slice(0,6).forEach(a=>{
  h+=`<div class="edito-trib-card" onclick="window.open('${a.link}','_blank')"><div class="et-img"><img src="${a.image_url}" alt="" onerror="this.parentElement.style.display='none'"></div><div class="et-content"><div class="et-title">${a.title}</div><div class="et-desc">${a.description?a.description.substring(0,150)+'...':''}</div><div><span class="et-author">${a.author||'La rédaction'}</span><span class="et-date"> · ${fS(a.pub_date)}</span></div></div></div>`});
  h+=`</div></div>`}

  // 10. FINANCE — Brent, EUR/USD, Or en cartes fixes + Amadeus & Booking en liste
  const allFin=Object.entries(market);
  if(allFin.length){
    const cardKeys=['brent','eurusd','GC=F'];
    const forceListKeys=['AMS.MC','BKNG'];
    const topCards=cardKeys.map(k=>[k,market[k]]).filter(([k,v])=>v);
    // Ajouter d'autres cartes si moins de 4, en excluant ceux forcés en liste
    const cardKeySet=new Set(cardKeys);const forceListSet=new Set(forceListKeys);
    const remaining=[...allFin].filter(([k])=>!cardKeySet.has(k)&&!forceListSet.has(k)).sort((a,b)=>Math.abs(b[1].change_pct)-Math.abs(a[1].change_pct));
    while(topCards.length<4&&remaining.length){topCards.push(remaining.shift())}
    const topKeysFinal=new Set(topCards.map(([k])=>k));
    const rest=allFin.filter(([k])=>!topKeysFinal.has(k));
    // S'assurer que Amadeus et Booking sont dans la liste
    h+=`<div class="sl fi" id="finance">Indicateurs économiques clés</div><div class="fgr fi">`;
    topCards.forEach(([k,v])=>{const c=v.change_pct>=0?'#059669':'#DC2626';h+=`<div class="fc"><div class="lb2">${v.label}</div><div class="vl">${v.currency}${v.current_price}</div><div class="cg ${v.change_pct>=0?'cdn':'cu'}">${v.change_pct>=0?'▲':'▼'} ${Math.abs(v.change_pct)}%</div><div class="sp">${spk(v.history,c)}</div></div>`});
    h+=`</div>`;
    if(rest.length){h+=`<div class="bc fi"><table class="bt"><thead><tr><th>Valeur</th><th style="text-align:right">Cours</th><th style="text-align:right">Variation</th></tr></thead><tbody>`;
    rest.sort((a,b)=>a[1].change_pct-b[1].change_pct);rest.forEach(([k,v])=>{const c=v.change_pct>=0?'#166534':'#991B1B';const sc=v.sector==='aerien'?'sa':v.sector==='hotellerie'?'sh':v.sector==='croisiere'?'scr':v.sector==='to'?'sto':v.sector==='ota'?'sot':v.sector==='forex'?'ste':v.sector==='commodity'?'sto':'ste';h+=`<tr><td><span class="tn">${v.label}</span> <span class="ts2">${v.symbol}<span class="tsc ${sc}">${v.sector||''}</span></span></td><td style="text-align:right;font-weight:600;font-family:'IBM Plex Mono'">${v.currency}${v.current_price}</td><td style="text-align:right;font-weight:600;color:${c}">${v.change_pct>=0?'+':''}${v.change_pct}%</td></tr>`});
    h+=`</tbody></table></div>`}}

  h+=`</div>`; // end main-col

  // === RIGHT COLUMN (sidebar) ===
  h+=`<div class="side-col" id="themes">`;
  const themeCats=['aerien','institutionnel','croisiere','juridique','solutions','geopolitique','economie','destinations','general'];
  themeCats.sort((a,b)=>{if(a==='general')return 1;if(b==='general')return -1;return(CATS[a]||CATS.general).l.localeCompare((CATS[b]||CATS.general).l,'fr')});
  themeCats.forEach(cat=>{
    const arts=byCat[cat]||[];if(!arts.length)return;const cf=CATS[cat]||CATS.general;
    h+=`<div class="cd cd-${cat}"><div class="hd"><div class="ci" style="background:${cf.bg};color:${cf.c}">${cf.i}</div><span class="ct">${cf.l}</span><span class="cc" style="background:${cf.cc}">${arts.length}</span></div>`;
    if(cat==='juridique'){arts.slice(0,3).forEach(a=>{h+=`<div class="jur" onclick="window.open('${a.link}','_blank')"><span class="jur-d"></span><div><div class="jur-t">${a.title}${nb(a.pub_date)}</div><div class="jur-m">${a.author||''} · ${fS(a.pub_date)}</div></div></div>`})}
    else if(cat==='solutions'){arts.slice(0,3).forEach(a=>{h+=`<div class="sol" onclick="window.open('${a.link}','_blank')"><div class="sol-top"><span class="sol-badge">SOLUTION</span><span class="sol-s">${a.author||''} · ${fS(a.pub_date)}</span></div><div class="sol-t">${a.title}${nb(a.pub_date)}</div></div>`})}
    else{arts.slice(0,3).forEach(a=>{const img=vi(a.image_url)?`<img src="${a.image_url}" alt="" class="ni-img" onerror="this.remove()">`:'';h+=`<div class="ni" onclick="window.open('${a.link}','_blank')">${img}<div class="ni-body"><div class="nt">${a.title}${nb(a.pub_date)}</div><div class="nm">${a.author||''} · ${fS(a.pub_date)}</div></div></div>`})}
    if(arts.length>3){h+=`<div class="voir-plus" onclick="openMo('${cat}')">Voir les ${arts.length-3} autres ▾</div>`}
    h+=`</div>`});
  h+=`</div>`; // end side-col
  h+=`</div>`; // end layout

  h+=`<div class="ft">Données <a href="https://www.tourmag.com/tags/crise+golfe/" target="_blank">TourMaG</a> · <a href="https://www.diplomatie.gouv.fr/fr/conseils-aux-voyageurs/" target="_blank">France Diplomatie</a> · Yahoo Finance · IA Groq · MàJ auto 3h</div>`;
  document.getElementById('app').innerHTML=h;initMap(mae)}

function initMap(mae){
  const isMobile=window.innerWidth<=768;
  const mapOpts={zoomControl:false,attributionControl:false};
  if(isMobile){mapOpts.dragging=false;mapOpts.tap=false;mapOpts.scrollWheelZoom=false;mapOpts.touchZoom=false;mapOpts.doubleClickZoom=false;mapOpts.boxZoom=false;mapOpts.keyboard=false}
  const map=L.map('map',mapOpts).setView([29,44],4);
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:8,attribution:''}).addTo(map);
  if(!isMobile)L.control.zoom({position:'topright'}).addTo(map);
  if(isMobile){const ov=document.createElement('div');ov.className='map-touch-overlay';document.querySelector('.map-full').appendChild(ov)}
  const cm={red:'#DC2626',orange:'#EA580C',yellow:'#D97706',green:'#059669',gray:'#9CA3AF'};
  Object.entries(CC).forEach(([co,cd])=>{
    const md=mae[co],color=md?cm[md.color]||cm.gray:cm.gray,arts=ABC[co]||[];
    L.circleMarker(cd,{radius:20,fillColor:color,color:color,weight:1.5,opacity:.3,fillOpacity:.1,interactive:false}).addTo(map);
    if(arts.length>0){
      const r2=Math.min(Math.max(arts.length*2,6),16);
      const pi=L.divIcon({className:'',html:`<div style="width:${(r2+10)*2}px;height:${(r2+10)*2}px;border-radius:50%;background:${color};opacity:.3;animation:mpulse 2.5s ease-out infinite;position:relative;left:-${r2+10}px;top:-${r2+10}px"></div>`,iconSize:[0,0]});
      L.marker(cd,{icon:pi,interactive:false}).addTo(map);
      const mk=L.circleMarker(cd,{radius:r2,fillColor:color,color:'#fff',weight:2,opacity:1,fillOpacity:.75}).addTo(map);
      mk.on('mouseover',function(){showP(co,arts)});mk.on('mouseout',function(){hideP()});mk.on('click',function(){showP(co,arts)})}})}

async function init(){
  const[aS,mS,maeS,cS,synS,tlS,alS]=await Promise.all([db.collection('articles').orderBy('pub_date','desc').get(),db.collection('market_data').get(),db.collection('mae_alerts').get(),db.collection('config').doc('radar').get(),db.collection('config').doc('synthesis').get(),db.collection('config').doc('timeline').get(),db.collection('config').doc('airlines').get()]);
  const articles=[];aS.forEach(d=>articles.push({id:d.id,...d.data()}));
  const market={};mS.forEach(d=>market[d.id]=d.data());
  const mae={};maeS.forEach(d=>mae[d.id]=d.data());
  render({articles,market,mae,config:cS.exists?cS.data():{},synthesis:synS.exists?synS.data():{},timeline:tlS.exists?tlS.data():{},airlines:alS.exists?alS.data():{}});
  const obs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('vis');obs.unobserve(e.target)}})},{threshold:.08});
  document.querySelectorAll('.fi').forEach(el=>obs.observe(el))}
init().catch(e=>{console.error(e);document.getElementById('app').innerHTML='<div class="ld" style="color:#DC2626">Erreur — voir console</div>'});
function sendHeight(){const h=Math.max(document.documentElement.scrollHeight,document.body.scrollHeight,document.documentElement.offsetHeight);window.parent.postMessage({type:'radar-resize',height:h},'*');window.parent.postMessage({type:'setHeight',height:h},'*')}
window.addEventListener('load',()=>{document.documentElement.style.overflow='visible';document.body.style.overflow='visible';sendHeight();new MutationObserver(sendHeight).observe(document.body,{childList:true,subtree:true});new ResizeObserver(sendHeight).observe(document.body);setInterval(sendHeight,1500)});
</script>
