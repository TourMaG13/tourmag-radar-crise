<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crise au Moyen-Orient | TourMaG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{--pri:#1B1B2F;--acc:#E8842C;--acc2:#D4731D;--blue:#0C6CA1;--green:#059669;--orange:#EA580C;--red:#DC2626;--amber:#D97706;--violet:#7C3AED;--cyan:#0891B2;--bg:#FFFFFF;--card:#FFF;--text:#111827;--text2:#4B5563;--text3:#9CA3AF;--border:#E5E7EB;--rl:16px;--shadow:0 2px 12px rgba(0,0,0,.06)}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%}
.leaflet-container{touch-action:pan-y!important}
@media(max-width:768px){.leaflet-container{pointer-events:none}.map-touch-overlay{position:absolute;inset:0;z-index:500;background:transparent}}
.header{display:none}
.intro-p{display:none}
.upd-bar{display:flex;justify-content:flex-end;padding:8px 28px 0;font-family:'IBM Plex Mono';font-size:9px;color:var(--text3)}
@media(max-width:768px){.upd-bar{padding:6px 8px 0}}
.dash{max-width:1200px;margin:0 auto;padding:24px 28px}
@media(max-width:768px){.dash{padding:12px 8px}}
.sl{font-family:'Josefin Sans';font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:3px;color:var(--text3);margin:36px 0 14px;display:flex;align-items:center;gap:8px}.sl::after{content:'';flex:1;height:1px;background:var(--border)}
.fi{opacity:0;transform:translateY(18px);transition:opacity .55s ease,transform .55s ease}.fi.vis{opacity:1;transform:translateY(0)}
.bdg-new{display:inline-block;font-size:8px;font-weight:700;color:#fff;background:var(--acc);padding:2px 8px;border-radius:4px;margin-left:6px;letter-spacing:.5px;vertical-align:middle}
.hero{background:linear-gradient(135deg,#1B1B2F 0%,#2D1B4E 40%,#1B1B2F 100%);border-radius:var(--rl);padding:28px 36px 24px;margin-bottom:44px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:340px;height:340px;background:radial-gradient(circle,rgba(232,132,44,.12) 0%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:-30px;left:-30px;width:240px;height:240px;background:radial-gradient(circle,rgba(220,38,38,.08) 0%,transparent 70%);pointer-events:none}
.hero-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;position:relative}
.hero-title{font-family:'Josefin Sans';font-size:22px;font-weight:700;color:#fff}
.hero-day{display:flex;align-items:center;gap:8px}.hd-num{font-family:'IBM Plex Mono';font-size:24px;font-weight:600;color:var(--acc)}.hd-lbl{font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:1.5px}
/* Essentiel cards inside hero */
.hero-ess-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;position:relative}
@media(max-width:768px){.hero-ess-grid{grid-template-columns:1fr}}
.hero-ess-card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:14px 16px;display:flex;flex-direction:column;gap:6px;border-left:3px solid transparent}
.hero-ess-card:nth-child(1){border-left-color:#3B82F6}.hero-ess-card:nth-child(2){border-left-color:#DC2626}.hero-ess-card:nth-child(3){border-left-color:#D97706}.hero-ess-card:nth-child(4){border-left-color:#059669}.hero-ess-card:nth-child(5){border-left-color:#7C3AED}.hero-ess-card:nth-child(6){border-left-color:#0891B2}
.hero-ess-top{display:flex;align-items:center;gap:8px}
.hero-ess-num{font-family:'Josefin Sans';font-size:20px;font-weight:700;line-height:1}
.hero-ess-card:nth-child(1) .hero-ess-num{color:#60A5FA}.hero-ess-card:nth-child(2) .hero-ess-num{color:#F87171}.hero-ess-card:nth-child(3) .hero-ess-num{color:#FBBF24}.hero-ess-card:nth-child(4) .hero-ess-num{color:#34D399}.hero-ess-card:nth-child(5) .hero-ess-num{color:#A78BFA}.hero-ess-card:nth-child(6) .hero-ess-num{color:#22D3EE}
.hero-ess-tag{font-family:'Josefin Sans';font-size:7px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:2px 6px;border-radius:3px;white-space:nowrap}
.hero-ess-tag[data-t="AÉRIEN"]{background:rgba(96,165,250,.2);color:#93C5FD}.hero-ess-tag[data-t="GÉOPOLITIQUE"]{background:rgba(248,113,113,.2);color:#FCA5A5}.hero-ess-tag[data-t="DESTINATIONS"]{background:rgba(96,165,250,.2);color:#93C5FD}.hero-ess-tag[data-t="JURIDIQUE"]{background:rgba(251,191,36,.2);color:#FDE68A}.hero-ess-tag[data-t="TOUR-OPÉRATEURS"]{background:rgba(52,211,153,.2);color:#6EE7B7}.hero-ess-tag[data-t="CONSEIL"]{background:rgba(167,139,250,.2);color:#C4B5FD}.hero-ess-tag[data-t="INFO"]{background:rgba(255,255,255,.1);color:rgba(255,255,255,.5)}
.hero-ess-txt{font-size:11px;line-height:1.55;color:rgba(255,255,255,.7)}.hero-ess-txt strong{font-weight:700;color:#fff}
/* Timeline */
.hero-tl{position:relative;margin-bottom:18px;padding-top:8px}
.hero-tl-track{display:grid;grid-template-columns:repeat(6,1fr);gap:0;position:relative}
.hero-tl-track::before{content:'';position:absolute;top:14px;left:0;right:0;height:2px;background:rgba(255,255,255,.15)}
.hero-tl-item{display:flex;flex-direction:column;align-items:center;padding:0 4px}
.hero-tl-dot{width:12px;height:12px;border-radius:50%;background:var(--acc);border:3px solid rgba(27,27,47,.8);box-shadow:0 0 0 2px var(--acc);z-index:1;margin-bottom:8px}
.hero-tl-date{font-family:'IBM Plex Mono';font-size:9px;color:var(--acc);font-weight:600;margin-bottom:3px}
.hero-tl-ev{font-size:10px;color:rgba(255,255,255,.6);text-align:center;line-height:1.4;font-weight:400}
@media(max-width:768px){.hero-tl-track{grid-template-columns:repeat(4,1fr)}.hero-tl-item:nth-child(-n+2){display:none}.hero-ess-grid{grid-template-columns:1fr}.hero-title{font-size:17px}.hero{padding:20px 12px 18px;margin-bottom:20px;border-radius:12px}}
/* Indicators under timeline */
.hero-ind-row{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:10px}
@media(max-width:768px){.hero-ind-row{grid-template-columns:repeat(3,1fr)}}
.hero-ind-cell{display:flex;flex-direction:column;padding:8px 10px;cursor:pointer;transition:opacity .15s;text-decoration:none;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:8px}.hero-ind-cell:hover{opacity:.85}
.hero-ind-cell .hic-lbl{font-size:7px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.3px;font-weight:600;margin-bottom:3px}
.hero-ind-cell .hic-val{font-family:'IBM Plex Mono';font-size:12px;font-weight:700;color:#fff;margin-bottom:1px}
.hero-ind-cell .hic-chg{font-size:9px;font-weight:600}
.hero-ind-cell .hic-spark{margin-top:4px;display:flex;justify-content:flex-end}
.flash{display:flex;align-items:center;gap:12px;padding:12px 20px;background:linear-gradient(90deg,#7F1D1D,#991B1B);border-radius:var(--rl);margin-bottom:14px;cursor:pointer;transition:box-shadow .15s;overflow:hidden}.flash:hover{box-shadow:0 4px 16px rgba(220,38,38,.2)}
.flash-badge{font-family:'Josefin Sans';font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#fff;background:var(--red);padding:4px 12px;border-radius:6px;flex-shrink:0;white-space:nowrap;animation:fpls 2s infinite}
@keyframes fpls{0%,100%{opacity:1}50%{opacity:.6}}
.flash-text{font-size:15px;font-weight:500;color:rgba(255,255,255,.9);flex:1;line-height:1.4}
.flash-date{font-family:'IBM Plex Mono';font-size:10px;color:rgba(255,255,255,.4);flex-shrink:0;white-space:nowrap}
@media(max-width:768px){.flash{flex-wrap:wrap;gap:8px;padding:10px 12px}.flash-text{font-size:12px;order:3;flex-basis:100%}.flash-date{order:2}}
.layout{display:grid;grid-template-columns:1fr 320px;gap:28px;align-items:start}
@media(max-width:960px){.layout{grid-template-columns:1fr;gap:20px}}
.main-col{min-width:0}.side-col{min-width:0}
@media(max-width:960px){.side-col{order:10}}
.une-h{border-radius:var(--rl);overflow:hidden;position:relative;min-height:280px;cursor:pointer;margin-bottom:14px;transition:transform .25s,box-shadow .25s}.une-h:hover{transform:translateY(-3px);box-shadow:0 16px 48px rgba(0,0,0,.2)}
.une-h-bg{position:absolute;inset:0;background:linear-gradient(135deg,var(--pri),#2D2D44)}.une-h-bg img{width:100%;height:100%;object-fit:cover;opacity:.55;transition:opacity .3s}.une-h:hover .une-h-bg img{opacity:.65}
.une-h-ov{position:absolute;inset:0;background:linear-gradient(0deg,rgba(27,27,47,.95) 0%,rgba(27,27,47,.5) 45%,rgba(27,27,47,.15) 100%)}
.une-h-bd{position:relative;z-index:2;padding:32px 36px;display:flex;flex-direction:column;justify-content:flex-end;min-height:280px}
.une-h-bd .bdg{display:inline-block;font-family:'Josefin Sans';font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#fff;background:var(--red);padding:5px 14px;border-radius:6px;margin-bottom:14px;width:fit-content}
.une-h-bd h3{font-size:22px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:10px;max-width:700px}
.une-h-bd .ch{font-size:13px;color:rgba(255,255,255,.7);line-height:1.6;max-width:600px}
.une-h-bd .mt{font-size:11px;color:rgba(255,255,255,.4);margin-top:12px}.une-h-bd .mt a{color:var(--acc);text-decoration:none;font-weight:600}
@media(max-width:768px){.une-h-bd{padding:20px 16px;min-height:220px}.une-h-bd h3{font-size:17px}}
.vign-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px}
@media(max-width:768px){.vign-row{grid-template-columns:1fr;gap:10px}}
.vign{border-radius:12px;overflow:hidden;border:1px solid var(--border);background:var(--card);cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:var(--shadow)}.vign:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.08)}
.vign-img{height:120px;overflow:hidden;background:#F1F5F9}.vign-img img{width:100%;height:100%;object-fit:cover}
.vign-body{padding:12px 14px}.vign-body .vt{font-size:12px;font-weight:600;line-height:1.4;color:var(--text);margin-bottom:4px}.vign-body .vm{font-size:10px;color:var(--text3)}
.vign-row{margin-bottom:32px}
/* Map + MAE panel layout */
.map-mae-row{display:grid;grid-template-columns:1fr 300px;gap:16px;margin-bottom:8px}
@media(max-width:960px){.map-mae-row{grid-template-columns:1fr}}
.map-full{border-radius:var(--rl);border:1px solid var(--border);overflow:hidden;height:420px;position:relative;box-shadow:var(--shadow)}
#map{height:100%;width:100%}
@media(max-width:768px){.map-full{height:280px}}
.mae-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column;max-height:420px}
.mae-panel-hd{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.mae-panel-hd h3{font-family:'Josefin Sans';font-size:12px;font-weight:700;color:var(--pri)}
.mae-panel-hd .mae-count{font-size:9px;font-weight:700;color:#fff;background:var(--red);padding:2px 8px;border-radius:20px;margin-left:auto}
.mae-panel-list{overflow-y:auto;flex:1}
.mae-item{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}.mae-item:last-child{border-bottom:none}.mae-item:hover{background:#F8FAFC}
.mae-item-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.mae-item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.mae-item-dot.red{background:var(--red)}.mae-item-dot.orange{background:var(--orange)}.mae-item-dot.yellow{background:var(--amber)}.mae-item-dot.green{background:var(--green)}.mae-item-dot.gray{background:#9CA3AF}
.mae-item-name{font-size:11px;font-weight:600;color:var(--text)}
.mae-item-level{font-size:9px;color:var(--text3);margin-bottom:4px;font-weight:500}
.mae-item-conseil{font-size:10px;color:var(--text2);line-height:1.45;margin-top:2px;padding:0}
@media(max-width:960px){.mae-panel{max-height:300px;margin-bottom:8px}}
.mp{position:absolute;top:12px;right:12px;width:320px;max-height:400px;background:rgba(255,255,255,.97);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:14px;z-index:800;overflow:hidden;display:none;box-shadow:0 8px 32px rgba(0,0,0,.18)}.mp.show{display:flex;flex-direction:column}
.mp-h{padding:12px 14px;border-bottom:1px solid var(--border);position:relative}.mp-h h3{font-family:'Josefin Sans';font-size:13px;font-weight:700;color:var(--pri)}.mp-h .pc{font-size:10px;color:var(--text3)}.mp-h .cls{position:absolute;top:8px;right:10px;background:none;border:none;font-size:18px;color:var(--text3);cursor:pointer}
.mp-badge{display:inline-block;font-size:10px;font-weight:600;padding:4px 12px;border-radius:8px;margin:6px 14px}
.mp-b{overflow-y:auto;max-height:300px}
.pa{padding:8px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}.pa:hover{background:#F0F7FF}.pa:last-child{border-bottom:none}.pa .pt{font-size:11px;color:var(--text);line-height:1.4;font-weight:500}.pa .pm{font-size:9px;color:var(--text3);margin-top:2px}
.mae-bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;margin-bottom:20px}
.mae-chip{display:flex;align-items:center;gap:6px;padding:5px 10px;background:var(--card);border:1px solid var(--border);border-radius:8px;font-size:9px;font-weight:500;cursor:pointer;transition:background .1s;white-space:nowrap}.mae-chip:hover{background:#FAFBFD}
.mae-chip .md{width:7px;height:7px;border-radius:50%;flex-shrink:0}.mae-chip .md.red{background:var(--red)}.mae-chip .md.orange{background:var(--orange)}.mae-chip .md.yellow{background:var(--amber)}.mae-chip .md.green{background:var(--green)}.mae-chip .md.gray{background:#9CA3AF}
/* Essentiel — même fond que hero/timeline */
.ess2{background:linear-gradient(135deg,#1B1B2F 0%,#2D1B4E 40%,#1B1B2F 100%);border:none;border-radius:var(--rl);padding:28px 32px;margin-bottom:20px;box-shadow:0 4px 20px rgba(0,0,0,.15);position:relative;overflow:hidden}
.ess2::before{content:'';position:absolute;top:-20px;right:-20px;width:200px;height:200px;background:radial-gradient(circle,rgba(232,132,44,.1) 0%,transparent 70%);pointer-events:none}
.ess2-head{margin-bottom:6px;position:relative}.ess2-head h2{font-family:'Josefin Sans';font-size:18px;font-weight:700;color:#fff}
.ess2-sub{font-size:11px;color:rgba(255,255,255,.5);margin-bottom:18px;letter-spacing:.3px;position:relative}
.ess2-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;position:relative}@media(max-width:700px){.ess2-grid{grid-template-columns:1fr}}
.ess2-card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:16px 18px;display:flex;flex-direction:column;gap:8px;transition:transform .15s,box-shadow .15s;border-left:4px solid transparent;box-shadow:none}.ess2-card:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.2)}
@media(max-width:768px){.ess2{padding:18px 14px}.ess2-card{padding:12px 10px}.ess2-num{font-size:20px}}
.ess2-card:nth-child(1){border-left-color:#3B82F6}.ess2-card:nth-child(2){border-left-color:#DC2626}.ess2-card:nth-child(3){border-left-color:#D97706}.ess2-card:nth-child(4){border-left-color:#059669}.ess2-card:nth-child(5){border-left-color:#7C3AED}.ess2-card:nth-child(6){border-left-color:#0891B2}
.ess2-top{display:flex;align-items:center;gap:10px}
.ess2-num{font-family:'Josefin Sans';font-size:26px;font-weight:700;line-height:1}
.ess2-card:nth-child(1) .ess2-num{color:#3B82F6}.ess2-card:nth-child(2) .ess2-num{color:#DC2626}.ess2-card:nth-child(3) .ess2-num{color:#D97706}.ess2-card:nth-child(4) .ess2-num{color:#059669}.ess2-card:nth-child(5) .ess2-num{color:#7C3AED}.ess2-card:nth-child(6) .ess2-num{color:#0891B2}
.ess2-tag{font-family:'Josefin Sans';font-size:7px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:3px 6px;border-radius:4px;white-space:nowrap;text-align:center}
.ess2-tag[data-t="AÉRIEN"]{background:#DBEAFE;color:#1E40AF}.ess2-tag[data-t="GÉOPOLITIQUE"]{background:#FEE2E2;color:#991B1B}.ess2-tag[data-t="DESTINATIONS"]{background:#DBEAFE;color:#1E3A5F}.ess2-tag[data-t="JURIDIQUE"]{background:#FEF3C7;color:#92400E}.ess2-tag[data-t="TOUR-OPÉRATEURS"]{background:#D1FAE5;color:#065F46}.ess2-tag[data-t="CONSEIL"]{background:#EDE9FE;color:#5B21B6}.ess2-tag[data-t="INFO"]{background:#F1F5F9;color:#475569}
.ess2-txt{font-size:12px;line-height:1.6;color:rgba(255,255,255,.85)}.ess2-txt strong{font-weight:700;color:#FDBA74}
/* Conseils — jaune/ambre dégradé */
.act-box{background:linear-gradient(135deg,#FEF3C7,#FDE68A);border:1px solid #F59E0B;border-radius:var(--rl);padding:24px 28px;margin-bottom:20px}
.act-box h3{font-family:'Josefin Sans';font-size:15px;font-weight:700;color:#78350F;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.act-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.act-card{background:#fff;border:1px solid #FBBF24;border-radius:12px;padding:14px 16px;display:flex;gap:10px;align-items:flex-start}
.act-icon{width:34px;height:34px;border-radius:10px;background:#FEF3C7;display:flex;align-items:center;justify-content:center;flex-shrink:0}.act-icon svg{width:16px;height:16px}
.act-card .act-t{font-size:11px;font-weight:600;color:var(--text);margin-bottom:3px}.act-card .act-d{font-size:10px;color:var(--text2);line-height:1.5}
.dep-board{background:var(--pri);border-radius:var(--rl);padding:20px 24px;margin-bottom:20px;overflow:hidden;box-shadow:var(--shadow)}
.dep-tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid rgba(255,255,255,.1)}
.dep-tab{padding:10px 20px;font-family:'Josefin Sans';font-size:12px;font-weight:700;color:rgba(255,255,255,.4);cursor:pointer;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;white-space:nowrap}.dep-tab:hover{color:rgba(255,255,255,.6)}.dep-tab.active{color:var(--acc);border-bottom-color:var(--acc)}
.dep-tab-content{display:none}.dep-tab-content.active{display:block}
.dep-board-hd{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.08)}.dep-board-hd h3{font-family:'Josefin Sans';font-size:14px;font-weight:700;color:rgba(255,255,255,.9)}.dep-board-hd .icon{font-size:18px}
.dep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px}
.dep-rt-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.08);flex-wrap:wrap;gap:8px}
.dep-rt-badge{font-family:'Josefin Sans';font-size:12px;font-weight:700;color:var(--acc);display:flex;align-items:center;gap:8px}
.dep-rt-upd{font-family:'IBM Plex Mono';font-size:9px;color:rgba(255,255,255,.35)}
.dep-rt-dest{margin-bottom:12px}
.dep-rt-dest-name{font-family:'Josefin Sans';font-size:12px;font-weight:600;color:rgba(255,255,255,.6);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.dep-rt-flights{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:6px}
/* Accordéon destinations */
.dep-acc{border-bottom:1px solid rgba(255,255,255,.06)}.dep-acc:last-child{border-bottom:none}
.dep-acc-hd{display:flex;align-items:center;gap:12px;padding:14px 0;cursor:pointer;transition:opacity .15s}.dep-acc-hd:hover{opacity:.8}

  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:8,attribution:''}).addTo(map);
  if(!isMobile)L.control.zoom({position:'topright'}).addTo(map);
  if(isMobile){const ov=document.createElement('div');ov.className='map-touch-overlay';document.querySelector('.map-full').appendChild(ov)}
  const cm={red:'#DC2626',orange:'#EA580C',yellow:'#D97706',green:'#059669',gray:'#9CA3AF'};
  Object.entries(CC).forEach(([co,cd])=>{
    const md=mae[co],color=md?cm[md.color]||cm.gray:cm.gray,arts=ABC[co]||[];
    L.circleMarker(cd,{radius:20,fillColor:color,color:color,weight:1.5,opacity:.3,fillOpacity:.1,interactive:false}).addTo(map);
    if(arts.length>0){
      const r2=Math.min(Math.max(arts.length*2,6),16);
      const pi=L.divIcon({className:'',html:`<div style="width:${(r2+10)*2}px;height:${(r2+10)*2}px;border-radius:50%;background:${color};opacity:.3;animation:mpulse 2.5s ease-out infinite;position:relative;left:-${r2+10}px;top:-${r2+10}px"></div>`,iconSize:[0,0]});
      L.marker(cd,{icon:pi,interactive:false}).addTo(map);
      const mk=L.circleMarker(cd,{radius:r2,fillColor:color,color:'#fff',weight:2,opacity:1,fillOpacity:.75}).addTo(map);
      mk.on('mouseover',function(){showP(co,arts)});mk.on('mouseout',function(){hideP()});mk.on('click',function(){showP(co,arts)})}})}

async function init(){
  const[aS,mS,maeS,cS,synS,tlS,alS]=await Promise.all([db.collection('articles').orderBy('pub_date','desc').get(),db.collection('market_data').get(),db.collection('mae_alerts').get(),db.collection('config').doc('radar').get(),db.collection('config').doc('synthesis').get(),db.collection('config').doc('timeline').get(),db.collection('config').doc('airlines').get()]);
  const articles=[];aS.forEach(d=>articles.push({id:d.id,...d.data()}));
  const market={};mS.forEach(d=>market[d.id]=d.data());
  const mae={};maeS.forEach(d=>mae[d.id]=d.data());
  render({articles,market,mae,config:cS.exists?cS.data():{},synthesis:synS.exists?synS.data():{},timeline:tlS.exists?tlS.data():{},airlines:alS.exists?alS.data():{}});
  const obs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('vis');obs.unobserve(e.target)}})},{threshold:.08});
  document.querySelectorAll('.fi').forEach(el=>obs.observe(el))}
init().catch(e=>{console.error(e);document.getElementById('app').innerHTML='<div class="ld" style="color:#DC2626">Erreur — voir console</div>'});
function sendHeight(){const h=Math.max(document.documentElement.scrollHeight,document.body.scrollHeight,document.documentElement.offsetHeight);window.parent.postMessage({type:'radar-resize',height:h},'*');window.parent.postMessage({type:'setHeight',height:h},'*')}
window.addEventListener('load',()=>{document.documentElement.style.overflow='visible';document.body.style.overflow='visible';sendHeight();new MutationObserver(sendHeight).observe(document.body,{childList:true,subtree:true});new ResizeObserver(sendHeight).observe(document.body);setInterval(sendHeight,1500)});
</script>
